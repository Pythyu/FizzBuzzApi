name: golangci-lint
on: [push]

permissions:
  contents: read

jobs:
  golangci:
    name: Running go linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - run: go mod tidy
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12