name: Run code quality tests
on: [push]

permissions:
  contents: read

jobs:
  golangci:
    name: Running go linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - run: go mod tidy
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12
  go_tests:
    name: Running Go unit tests
    runs-on: ubuntu-latest
    needs: golangci
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - run: go mod tidy
      - run: go test -v ./...